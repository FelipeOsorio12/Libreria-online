<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a id="logo" href="/index.html">Libreria</a>
        <a id="libros" href="/pages/books.html">Libros</a>
        <a id="login" href="/pages/login.html">Login</a>
      </div>
    </nav>

    <main class="main-content">
        
    <div class="login-container">
      <form class="login-form" action="/login" method="POST">
        <h1>Iniciar Sesión</h1>
        <h4>Accede a tu cuenta para continuar</h4>
        <label for="username">Usuario:</label>
        <input class="input-login" type="text" id="username" name="username" placeholder="Ingresa tu usuario" required />

        <label for="password">Contraseña:</label>
        <input class="input-login" type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required />

        <button class="btn" type="submit">Iniciar Sesión</button>

        <p class="register-link">
          ¿No tienes una cuenta?</p>
          <a href="/pages/register.html">Regístrate aquí</a>
      </form>

    </div>
      
    <footer class="footer">
      <p id="footer-text">
        &copy; 2024 Libreria. Todos los derechos reservados.
      </p>
    </footer>
  </body>
</html>
