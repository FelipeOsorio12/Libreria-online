<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/register.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a id="logo" href="/index.html">Libreria</a>
        <a id="libros" href="/pages/books.html">Libros</a>
        <a id="login" href="/pages/login.html">Login</a>
      </div>
    </nav>

    <main class="main-content">
      <div class="register-container">
        <form class="register-form" action="/register" method="POST">
          <h1>Registro</h1>
          <h4>Completa el formulario para registrarte</h4>

          <label for="username">Usuario:</label>
          <input class="input-register" type="text" id="username" name="username" placeholder="Ingresa tu usuario" required />

          <label for="email">Correo Electrónico:</label>
          <input class="input-register" type="email" id="email" name="email" placeholder="Ingresa tu correo electrónico" required />

          <label for="password">Contraseña:</label>
          <input class="input-register" type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required />

          <button class="btn" type="submit">Registrarse</button>

          <p class="login-link">
            ¿Ya tienes una cuenta?</p>
            <a href="/pages/login.html">Inicia sesión aquí</a> 
        </form>
      </div>

    <footer class="footer">
      <p id="footer-text">
        &copy; 2024 Libreria. Todos los derechos reservados.
      </p>
    </footer>
  </body>
</html>
